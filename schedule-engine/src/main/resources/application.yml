server:
  port: 8082

spring:
  application:
    name: schedule-engine
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vibe_schedule?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:localhost:8848}
  ai:
    retry:
      max-attempts: 1
    dashscope:
      read-timeout: 180
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${MODEL:qwen-max}

smartplanner:
  ai:
    schedule-timeout-seconds: 170

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
