server:
  port: 8080

spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vibe_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET:}
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:localhost:8848}
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 180000

security:
  jwt:
    issuer: ${JWT_ISSUER:http://vibe}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800}

auth:
  demo:
    username: ${AUTH_DEMO_USERNAME:demo}
    password: ${AUTH_DEMO_PASSWORD:demo123}
    roles: ${AUTH_DEMO_ROLES:USER}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
