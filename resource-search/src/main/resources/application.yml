server:
  port: 8083

spring:
  application:
    name: resource-search
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vibe_resource?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:localhost:8848}
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:DUMMY}
      base-url: ${BASE_URL:https://api.openai.com/v1}
      chat:
        options:
          model: ${MODEL:gpt-4o-mini}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
