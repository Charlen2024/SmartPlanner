server:
  port: 8083
  tomcat:
    uri-encoding: UTF-8
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: resource-search
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vibe_resource?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:localhost:8848}
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
  ai:
    retry:
      max-attempts: 1
    dashscope:
      read-timeout: 180
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${MODEL:qwen-max}

smartplanner:
  ai:
    rag-timeout-seconds: 45

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
