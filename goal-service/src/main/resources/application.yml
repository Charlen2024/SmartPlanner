server:
  port: 8081

spring:
  application:
    name: goal-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vibe_goal?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:localhost:8848}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  ai:
    retry:
      max-attempts: 1
    dashscope:
      read-timeout: 180
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${MODEL:qwen-max}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

seata:
  enabled: false
